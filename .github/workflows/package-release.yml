name: Package release ZIP

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: bash scripts/package-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: statsqr-release
          path: release/*.zip
